<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级日志笔记本</title>
    <style>
        :root {
            --paper-color: #fdfaf6;
            --line-color: #e0d8c8;
            --text-color: #333;
            --theme-color: #4a5568;
            --highlight-color: #fef08a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #7b5e43;
            background-image: repeating-linear-gradient(
                45deg,
                rgba(0,0,0,0.05) 0px,
                rgba(0,0,0,0.05) 2px,
                transparent 2px,
                transparent 4px
            );
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', "Microsoft YaHei", sans-serif;
            color: var(--text-color);
        }

        /* 笔记本外壳 */
        .notebook {
            width: 85vw;
            max-width: 1400px;
            min-width: 900px;
            height: 85vh;
            max-height: 900px;
            min-height: 600px;
            background: var(--paper-color);
            border-radius: 10px;
            box-shadow: 15px 15px 40px rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            position: relative;
        }

        /* 铁圈 */
        .binding {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 40px;
            transform: translateX(-50%);
            background: linear-gradient(to right, 
                rgba(0,0,0,0.1) 0%, 
                rgba(0,0,0,0.2) 20%, 
                rgba(0,0,0,0) 50%, 
                rgba(0,0,0,0.2) 80%, 
                rgba(0,0,0,0.1) 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }

        .ring {
            width: 30px;
            height: 10px;
            background: linear-gradient(to bottom, #eee, #999, #eee);
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .page {
            flex: 1;
            padding: 40px 50px;
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .page.left {
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .page.right {
            border-left: 1px solid rgba(255,255,255,0.8);
        }

        /* 左侧历史与搜索区 */
        h2 {
            margin-top: 0;
            text-align: center;
            font-size: 24px;
            color: var(--theme-color);
            border-bottom: 2px dashed var(--line-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .search-box {
            position: relative;
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            background: #f8fafc;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .history-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.02);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: var(--theme-color);
        }

        .history-snippet {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .highlight {
            background-color: var(--highlight-color);
            color: #000;
            font-weight: bold;
            border-radius: 2px;
            padding: 0 2px;
        }

        .history-item:hover, .history-item.active {
            background: #e2e8f0;
            box-shadow: inset 4px 0 0 var(--theme-color);
        }

        /* 云端配置区 */
        .github-settings {
            margin-top: 15px;
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
        }
        
        .github-settings input {
            width: 100%;
            margin-bottom: 8px;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }

        .github-settings label {
            display: block;
            margin-bottom: 4px;
            color: #475569;
            font-weight: bold;
        }

        .btn-pull {
            margin-top: 5px;
            background-color: #f59e0b;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-pull:hover {
            background-color: #d97706;
        }

        /* 右侧书写区 */
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 18px;
            color: #555;
            font-weight: bold;
        }

        .date-picker-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="date"] {
            border: none;
            background: transparent;
            font-size: 18px;
            font-weight: bold;
            color: #1a202c;
            cursor: pointer;
            font-family: inherit;
            outline: none;
            padding: 0;
            border-bottom: 2px solid transparent;
            transition: border-bottom 0.2s;
        }

        input[type="date"]:hover {
            border-bottom: 2px dashed #cbd5e1;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }

        .weather-selector {
            display: flex;
            gap: 15px;
        }

        .weather-icon {
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.2s;
            font-size: 24px;
        }

        .weather-icon.active {
            opacity: 1;
            transform: scale(1.3);
        }

        .main-title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 15px;
            color: #1a202c;
        }

        /* 上下分栏书写区 */
        .split-editors {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .section-emoji {
            font-size: 28px;
            margin-bottom: 5px;
            user-select: none;
        }

        textarea.editor {
            flex: 1;
            width: 100%;
            background-color: transparent;
            background-image: linear-gradient(transparent 35px, var(--line-color) 35px);
            background-size: 100% 36px;
            background-attachment: local;
            line-height: 36px;
            font-size: 20px;
            border: none;
            outline: none;
            resize: none;
            font-family: inherit;
            color: #2d3748;
            padding: 0 10px;
        }

        /* 底部按钮 */
        .actions {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button.action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-save { background-color: #3b82f6; color: white; }
        .btn-save:hover { background-color: #2563eb; }

        .btn-export { background-color: #10b981; color: white; }
        .btn-export:hover { background-color: #059669; }

        .status-msg {
            font-size: 14px;
            color: #64748b;
            margin-left: 15px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ========================================= */
        /* 📱 手机端/小屏幕自适应适配 */
        /* ========================================= */
        @media screen and (max-width: 900px) {
            body {
                height: auto;
                min-height: 100vh;
                padding: 15px;
                box-sizing: border-box;
                align-items: flex-start; 
            }
            .notebook {
                width: 100%;
                min-width: unset;
                height: auto;
                min-height: unset;
                max-height: unset;
                flex-direction: column;
                box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.2);
            }
            .binding { display: none; }
            .page { padding: 20px; }
            .page.left {
                border-right: none;
                border-bottom: 2px dashed var(--line-color);
                max-height: 45vh;
                overflow-y: auto;
            }
            .page.right {
                border-left: none;
                min-height: 60vh;
            }
            .header-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .main-title {
                font-size: 24px;
                letter-spacing: 2px;
            }
            textarea.editor {
                font-size: 16px;
                line-height: 32px;
                background-size: 100% 32px;
                background-image: linear-gradient(transparent 31px, var(--line-color) 31px);
            }
            .actions {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }
            .actions > div {
                display: flex;
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }
            .status-msg {
                margin-left: 0;
                text-align: center;
            }
            button.action-btn {
                width: 100%;
                padding: 15px; 
            }
        }
    </style>
</head>
<body>

    <div class="notebook">
        <div class="binding" id="binding"></div>

        <div class="page left">
            <h2>日志目录</h2>
            
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="支持多关键字同排搜索（空格隔开）...">
            </div>

            <div class="history-list" id="historyList">
                </div>

            <div class="github-settings">
                <strong>⚙️ 云端私有库同步配置</strong>
                <label style="margin-top:8px;">访问令牌 (Token):</label>
                <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                <label>文件保存路径 (可区分不同班级):</label>
                <input type="text" id="ghPath" placeholder="data/logs_classA.json" value="logs.json">
                <button class="btn-pull" id="btnPull">⬇️ 强制从云端拉取 (覆盖本地)</button>
            </div>
        </div>

        <div class="page right">
            <div class="header-info">
                <div class="date-picker-wrapper" title="点击更改日期">
                    <input type="date" id="dateInput">
                    <span id="weekdayDisplay"></span>
                </div>
                
                <div class="weather-selector" id="weatherSelector">
                    <span class="weather-icon" data-weather="☀️">☀️</span>
                    <span class="weather-icon" data-weather="⛅">⛅</span>
                    <span class="weather-icon" data-weather="🌧️">🌧️</span>
                    <span class="weather-icon" data-weather="❄️">❄️</span>
                </div>
            </div>
            
            <div class="main-title">今日班级纪要</div>
            
            <div class="split-editors">
                <div class="editor-section">
                    <div class="section-emoji">😃</div>
                    <textarea class="editor" id="editorGood"></textarea>
                </div>
                
                <div class="editor-section">
                    <div class="section-emoji">🙄</div>
                    <textarea class="editor" id="editorBad"></textarea>
                </div>
            </div>
            
            <div class="actions">
                <div style="display:flex; align-items:center;">
                    <button class="action-btn btn-save" id="btnSave">🔄 保存并同步 (智能合并)</button>
                    <span class="status-msg" id="statusMsg"></span>
                </div>
                <button class="action-btn btn-export" id="btnExport">导出为 TXT</button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        const GITHUB_OWNER = 'Dzreal'; 
        const GITHUB_REPO = 'Class-Data';   
        // =========================================================================

        let logsData = JSON.parse(localStorage.getItem('classLogsData')) || {};
        let currentDateStr = ''; 
        let editorTimer = null;

        const editorGood = document.getElementById('editorGood');
        const editorBad = document.getElementById('editorBad');
        const historyList = document.getElementById('historyList');
        const searchInput = document.getElementById('searchInput');
        
        const dateInput = document.getElementById('dateInput');
        const weekdayDisplay = document.getElementById('weekdayDisplay');
        
        const weatherIcons = document.querySelectorAll('.weather-icon');
        const statusMsg = document.getElementById('statusMsg');
        const ghTokenInput = document.getElementById('ghToken');
        const ghPathInput = document.getElementById('ghPath');

        const bindingStr = Array(18).fill('<div class="ring"></div>').join('');
        document.getElementById('binding').innerHTML = bindingStr;

        function getFormattedDate(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getWeekday(dateObj) {
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            return days[dateObj.getDay()];
        }

        function init() {
            loadGitHubConfig();
            const today = new Date();
            const todayStr = getFormattedDate(today);
            
            ensureLogExists(todayStr);
            renderHistoryList();
            loadLog(todayStr);
        }

        function ensureLogExists(dateStr) {
            if (!logsData[dateStr]) {
                const dateObj = new Date(dateStr);
                logsData[dateStr] = {
                    date: dateStr,
                    weekday: getWeekday(dateObj),
                    weather: '☀️',
                    contentGood: '• ', 
                    contentBad: '• '   
                };
                saveToLocal();
            } else {
                if (logsData[dateStr].content !== undefined) {
                    logsData[dateStr].contentGood = logsData[dateStr].content;
                    delete logsData[dateStr].content;
                    saveToLocal();
                }
            }
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        searchInput.addEventListener('input', function() {
            renderHistoryList(this.value);
        });

        function renderHistoryList(filterTerm = '') {
            historyList.innerHTML = '';
            const sortedDates = Object.keys(logsData).sort((a, b) => new Date(b) - new Date(a)); 
            const keywords = filterTerm.trim().toLowerCase().split(/\s+/).filter(k => k);

            sortedDates.forEach(date => {
                const log = logsData[date];
                const cGood = log.contentGood || '';
                const cBad = log.contentBad || '';
                
                const textG = cGood.replace(/[•\s\n\r]/g, '');
                const textB = cBad.replace(/[•\s\n\r]/g, '');
                if (textG === '' && textB === '') return; 

                let snippetHtml = '';
                let isMatch = false;

                if (keywords.length > 0) {
                    let matchLine = '';
                    let emojiPrefix = '';
                    
                    const goodLines = cGood.split('\n');
                    for (let line of goodLines) {
                        if (keywords.every(kw => line.toLowerCase().includes(kw))) {
                            isMatch = true;
                            matchLine = line;
                            emojiPrefix = '😃';
                            break;
                        }
                    }
                    
                    if (!isMatch) {
                        const badLines = cBad.split('\n');
                        for (let line of badLines) {
                            if (keywords.every(kw => line.toLowerCase().includes(kw))) {
                                isMatch = true;
                                matchLine = line;
                                emojiPrefix = '🙄';
                                break;
                            }
                        }
                    }

                    if (!isMatch) return; 

                    let highlightedLine = escapeHtml(matchLine);
                    const escapedKeywords = keywords.map(kw => kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
                    const combinedRegex = new RegExp(`(${escapedKeywords.join('|')})`, 'gi');
                    highlightedLine = highlightedLine.replace(combinedRegex, '<span class="highlight">$1</span>');
                    
                    snippetHtml = `<div class="history-snippet">${emojiPrefix} ${highlightedLine}</div>`;
                } else {
                    let previewText = cGood.replace(/• |\n/g, ' ').trim();
                    let emojiPrefix = '😃';
                    if (!previewText) {
                        previewText = cBad.replace(/• |\n/g, ' ').trim();
                        emojiPrefix = '🙄';
                    }
                    if (previewText) {
                        snippetHtml = `<div class="history-snippet">${emojiPrefix} ${previewText.substring(0, 18)}...</div>`;
                    }
                }

                const div = document.createElement('div');
                div.className = `history-item ${date === currentDateStr ? 'active' : ''}`;
                
                div.innerHTML = `
                    <div class="history-item-header">
                        <span>${date} ${log.weekday}</span>
                        <span>${log.weather}</span>
                    </div>
                    ${snippetHtml}
                `;
                div.onclick = () => {
                    if(filterTerm) {
                        searchInput.value = '';
                        renderHistoryList();
                    }
                    loadLog(date);
                };
                historyList.appendChild(div);
            });
        }

        dateInput.addEventListener('change', function() {
            const selectedDate = this.value;
            if (!selectedDate) return;
            
            ensureLogExists(selectedDate);
            loadLog(selectedDate);
        });

        function loadLog(dateStr) {
            currentDateStr = dateStr;
            const log = logsData[dateStr];
            
            dateInput.value = log.date;
            weekdayDisplay.textContent = log.weekday;
            
            editorGood.value = log.contentGood === '' ? '• ' : (log.contentGood || '• ');
            editorBad.value = log.contentBad === '' ? '• ' : (log.contentBad || '• ');
            
            weatherIcons.forEach(icon => {
                icon.classList.toggle('active', icon.dataset.weather === log.weather);
            });

            if(!searchInput.value) {
                renderHistoryList(); 
            }
            showStatus('已加载数据');
        }

        function handleAutoBullet(e, textarea) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                const bullet = '\n• ';
                
                textarea.value = text.substring(0, start) + bullet + text.substring(end);
                textarea.selectionStart = textarea.selectionEnd = start + bullet.length;
                triggerAutoSave();
            }
        }

        editorGood.addEventListener('keydown', (e) => handleAutoBullet(e, editorGood));
        editorBad.addEventListener('keydown', (e) => handleAutoBullet(e, editorBad));

        editorGood.addEventListener('input', triggerAutoSave);
        editorBad.addEventListener('input', triggerAutoSave);

        weatherIcons.forEach(icon => {
            icon.addEventListener('click', function() {
                const weather = this.dataset.weather;
                weatherIcons.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                logsData[currentDateStr].weather = weather;
                saveToLocal();
            });
        });

        function triggerAutoSave() {
            logsData[currentDateStr].contentGood = editorGood.value;
            logsData[currentDateStr].contentBad = editorBad.value;
            saveToLocal();
            
            if(!searchInput.value) {
                renderHistoryList();
            }
            
            showStatus('自动保存中...');
            clearTimeout(editorTimer);
            editorTimer = setTimeout(() => { showStatus('已缓存到本地'); }, 1000);
        }

        function saveToLocal() {
            localStorage.setItem('classLogsData', JSON.stringify(logsData));
        }

        function showStatus(msg) {
            statusMsg.textContent = msg;
            setTimeout(() => { if(statusMsg.textContent === msg) statusMsg.textContent = ''; }, 3000);
        }

        // 编码解码工具
        function utf8_to_b64(str) { 
            return window.btoa(unescape(encodeURIComponent(str))); 
        }
        function b64_to_utf8(str) { 
            return decodeURIComponent(escape(window.atob(str))); 
        }

        function loadGitHubConfig() {
            ghTokenInput.value = localStorage.getItem('gh_token') || '';
            ghPathInput.value = localStorage.getItem('gh_path') || 'logs.json';
        }

        function saveGitHubConfig() {
            localStorage.setItem('gh_token', ghTokenInput.value.trim());
            localStorage.setItem('gh_path', ghPathInput.value.trim());
        }

        // --- 纯手动拉取/覆盖数据逻辑 (重命名为强制拉取，避免误操作) ---
        document.getElementById('btnPull').addEventListener('click', async () => {
            saveGitHubConfig();
            const token = ghTokenInput.value.trim();
            const path = ghPathInput.value.trim();

            if (!token || !path) {
                alert('请先填写访问令牌(Token)和保存路径！'); return;
            }

            const confirmPull = confirm('⚠️ 警告：此操作将会用云端的数据【强制覆盖】你当前浏览器内的所有记录。请确认你真的想丢弃本地未同步的修改，或者你正在一台全新设备上。');
            if (!confirmPull) return;

            showStatus('正在从云端读取...');
            document.getElementById('btnPull').disabled = true;

            const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
            const headers = {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            };

            try {
                const getRes = await fetch(apiUrl, { method: 'GET', headers });
                
                if (getRes.status === 200) {
                    const fileData = await getRes.json();
                    const decodedContent = b64_to_utf8(fileData.content);
                    
                    const cloudData = JSON.parse(decodedContent);
                    if (Object.keys(cloudData).length > 0) {
                        logsData = cloudData;
                        saveToLocal();
                        
                        // 重新初始化页面以显示最新数据
                        const todayStr = getFormattedDate(new Date());
                        ensureLogExists(todayStr);
                        renderHistoryList();
                        loadLog(todayStr); 
                        
                        alert('✅ 成功从云端恢复数据！');
                        showStatus('数据已恢复');
                    } else {
                        alert('云端文件数据为空。');
                    }
                } else if (getRes.status === 404) {
                    alert('云端没有找到该文件。如果是新文件，请直接在右侧书写并点击【保存并同步】来创建。');
                    showStatus('云端文件不存在');
                } else {
                    throw new Error('获取失败，请检查 Token 权限或网络。状态码: ' + getRes.status);
                }
            } catch (error) {
                console.error(error);
                alert('读取失败: ' + error.message);
                showStatus('读取失败');
            } finally {
                document.getElementById('btnPull').disabled = false;
            }
        });

        // --- 核心优化：保存到云端逻辑 (先读取 -> 智能合并 -> 再推送，无文件则创建) ---
        document.getElementById('btnSave').addEventListener('click', async () => {
            triggerAutoSave();
            saveGitHubConfig();

            const token = ghTokenInput.value.trim();
            const path = ghPathInput.value.trim();

            if (!token || !path) {
                alert('请填写 Token 和 保存路径！'); return;
            }

            showStatus('正在请求云端数据...');
            document.getElementById('btnSave').disabled = true;

            const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
            const headers = {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };

            try {
                let sha = null;
                let cloudData = {};
                
                // 第 1 步：尝试先获取云端文件
                const getRes = await fetch(apiUrl, { method: 'GET', headers });
                
                if (getRes.status === 200) {
                    // 第 2 步：文件存在，执行智能合并
                    showStatus('正在合并云端与本地数据...');
                    const fileData = await getRes.json();
                    sha = fileData.sha; 
                    const decodedContent = b64_to_utf8(fileData.content);
                    
                    try {
                        cloudData = JSON.parse(decodedContent);
                    } catch (e) {
                        console.error('云端数据格式错误，跳过合并', e);
                    }

                    // 智能合并逻辑：优先保留云端数据，除非本地数据有实质性修改
                    for (const date in cloudData) {
                        if (!logsData[date]) {
                            // 本地完全没有这天的记录，直接拉取云端
                            logsData[date] = cloudData[date];
                        } else {
                            // 本地有这天的记录，检查是否为空白模板
                            const localGood = (logsData[date].contentGood || '').replace(/[•\s\n\r]/g, '');
                            const localBad = (logsData[date].contentBad || '').replace(/[•\s\n\r]/g, '');
                            
                            if (localGood === '' && localBad === '') {
                                // 本地只是系统默认生成的空壳，安全替换为云端历史数据，防止覆盖清空！
                                logsData[date] = cloudData[date];
                            }
                            // 如果本地有实际填写的文字，则保留本地最新修改，覆盖云端的该天数据
                        }
                    }
                    
                    saveToLocal(); // 更新本地缓存
                    renderHistoryList(); // 刷新左侧列表
                    
                } else if (getRes.status === 404) {
                    // 第 3 步：云端无文件，正常跳过合并步骤，直接走推送新建逻辑
                    console.log('云端文件不存在，将创建新文件。');
                    showStatus('云端无文件，准备创建...');
                } else {
                    throw new Error('获取云端信息失败，请检查 Token 和网络。');
                }

                // 第 4 步：将合并或新建后的数据推送到云端
                showStatus('正在推送到云端...');
                const encodedContent = utf8_to_b64(JSON.stringify(logsData, null, 2));
                const bodyData = { message: `自动同步并合并班级日志: ${currentDateStr}`, content: encodedContent };
                if (sha) bodyData.sha = sha; // 提供 sha 值用于覆盖旧文件

                const putRes = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(bodyData) });

                if (putRes.status === 200 || putRes.status === 201) {
                    showStatus('✅ 成功合并并同步至云端!');
                    // 重新渲染当前查看的日志，以免合并云端数据后没显示出来
                    loadLog(currentDateStr);
                } else {
                    throw new Error(`写入云端失败: 状态码 ${putRes.status}`);
                }
            } catch (error) {
                console.error(error);
                alert('同步失败: ' + error.message);
                showStatus('同步失败');
            } finally {
                document.getElementById('btnSave').disabled = false;
            }
        });

        document.getElementById('btnExport').addEventListener('click', () => {
            const log = logsData[currentDateStr];
            const content = `日期: ${log.date} ${log.weekday}\n天气: ${log.weather}\n---\n【今日班级纪要】\n\n😃 良好表现与事务:\n${log.contentGood}\n\n🙄 需改进与糟心事:\n${log.contentBad}`;
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `班级纪要_${log.date}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        init();
    </script>
</body>
</html>
