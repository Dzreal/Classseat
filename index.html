<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>班级工具导航站</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { 
            margin: 0; padding: 20px; 
            background-color: #f4f7f6; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }
        .header h1 { color: #2c3e50; margin-bottom: 10px; }
        .header p { color: #7f8c8d; margin: 0; }

        /* 卡片网格布局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* 单个工具卡片样式 */
        .tool-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 25px 20px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: #1abc9c;
        }

        .tool-card h3 { margin: 0 0 10px 0; color: #2c3e50; font-size: 1.3em; }
        .tool-card .file-name { font-size: 13px; color: #95a5a6; background: #f1f3f5; padding: 4px 8px; border-radius: 4px; }

        #loading {
            color: #1abc9c;
            font-size: 18px;
            font-weight: bold;
            margin-top: 50px;
            text-align: center;
        }
        
        #error-msg {
            color: #e74c3c;
            margin-top: 50px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛠️ 班级小工具导航站</h1>
        <p>自动同步 Dzreal/Class 仓库下的所有工具</p>
    </div>

    <div id="loading">正在扫描工具列表，请稍候...</div>
    <div id="error-msg">读取失败，请检查网络或稍后重试。</div>
    
    <div class="grid-container" id="toolGrid"></div>

    <script>
        // 你的公开导航库地址 (API读取不需要 Token)
        const OWNER = 'Dzreal';
        const REPO = 'Class';

        // 你可以在这里给指定的 HTML 文件设置“好听的中文名字”和“图标”
        // 如果这里没写，系统会自动直接使用原文件名
        const nameDict = {
            'classseats.html': '🪑 班级座位排布器',
            'vote.html': '📊 班级投票系统'
        };

        async function fetchTools() {
            const grid = document.getElementById('toolGrid');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('error-msg');

            try {
                // 调用 GitHub 公开 API 读取根目录内容
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/`);
                if (!response.ok) throw new Error('网络请求错误');
                
                const files = await response.json();
                
                // 过滤出 .html 文件，且排除掉 index.html 自己
                const htmlFiles = files.filter(file => 
                    file.type === 'file' && 
                    file.name.endsWith('.html') && 
                    file.name.toLowerCase() !== 'index.html'
                );

                loading.style.display = 'none';

                if (htmlFiles.length === 0) {
                    errorMsg.innerText = '当前仓库中没有找到其他 html 工具页面。';
                    errorMsg.style.display = 'block';
                    return;
                }

                // 遍历渲染卡片
                htmlFiles.forEach(file => {
                    const displayName = nameDict[file.name] || `🔧 ${file.name.replace('.html', '')}`;
                    
                    // 因为 index.html 和其他工具文件在同一目录，超链接直接写文件名即可
                    const a = document.createElement('a');
                    a.href = file.name;
                    a.className = 'tool-card';
                    a.innerHTML = `
                        <h3>${displayName}</h3>
                        <span class="file-name">${file.name}</span>
                    `;
                    grid.appendChild(a);
                });

            } catch (error) {
                console.error(error);
                loading.style.display = 'none';
                errorMsg.style.display = 'block';
            }
        }

        // 页面加载时自动执行
        window.onload = fetchTools;
    </script>
</body>
</html>
