<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理工具箱</title>
    <!-- 优化：提前连接 GitHub API 域名，加速后续的 DNS 解析和 TLS 握手时间 -->
    <link rel="preconnect" href="https://api.github.com">
    <style>
        body {
            font-family: Roboto, 'Segoe UI', "Microsoft YaHei", sans-serif;
            background-color: #f8f9fa; /* MD3 light background */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1a1c1e;
        }
        header {
            background-color: transparent;
            color: #1a1c1e;
            width: 100%;
            padding: 4rem 0 2rem;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: 0px;
        }
        .container {
            max-width: 1000px;
            width: 90%;
            margin: 1rem auto 4rem auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .card {
            background-color: #ffffff; /* pure white card */
            border-radius: 24px; /* Material 3 large radius */
            padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); /* very soft shadow */
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.3s cubic-bezier(0.2, 0, 0, 1);
            text-decoration: none;
            color: #1a1c1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08); /* elegant elevation */
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            margin: 0 0 1rem 0;
            font-size: 1.4rem;
            font-weight: 500;
            color: #1a1c1e;
        }
        .card p {
            margin: 0;
            color: #44474e; /* MD3 neutral variant */
            font-size: 1rem;
            line-height: 1.6;
        }
        /* 加载与提示样式 */
        #statusMessage {
            margin-top: 4rem;
            color: #44474e;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            flex-direction: column;
            gap: 16px;
            text-align: center;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 4px solid #e1e2e8;
            border-top-color: #0061a4; /* MD3 primary color */
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>帅哥的班级管理工具箱</h1>
    </header>

    <div id="statusMessage">
        <div class="spinner" id="spinner"></div>
        <span id="statusText">正在自动扫描工具箱最新组件...</span>
    </div>

    <div class="container" id="toolsContainer" style="display: none;">
        </div>

    <script>
        // 核心配置
        const owner = 'Dzreal';
        const repo = 'Class'; 

        // 🛡️ 保底配置：把四大金刚写在这里。哪怕 GitHub API 彻底断连，页面也能渲染出这四个工具！
        const fallbackTools = {
            "classseats.html": { icon: "🪑", title: "互动座位表", desc: "快速生成与调整学生座位安排，支持男女生分布与小组排列" },
            "classjournal.html": { icon: "📖", title: "班级日志", desc: "记录与查看班级日常事务与学生情况" },
            "exceltrans.html": { icon: "📊", title: "表格数据处理", desc: "快速处理、转换与导出Excel表格数据" },
            "vote.html": { icon: "🗳️", title: "班级投票系统", desc: "支持单选多选、云端保存配置与记录的实时投票工具" }
        };

        // 📌 固定排序：定义卡片的显示顺序，数字越小越靠前，未列出的工具排最后
        const sortOrder = {
            "classseats.html": 1,
            "classjournal.html": 2,
            "exceltrans.html": 3,
            "vote.html": 4
        };

        const container = document.getElementById('toolsContainer');
        const statusMessage = document.getElementById('statusMessage');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');

        // 渲染卡片的函数
        function renderCards(cardsData) {
            container.innerHTML = '';
            cardsData.forEach(data => {
                const card = document.createElement('a');
                card.href = data.url;
                card.className = 'card';
                card.innerHTML = `
                    <div class="icon">${data.icon}</div>
                    <h2>${data.title}</h2>
                    <p>${data.desc}</p>
                `;
                container.appendChild(card);
            });
            container.style.display = 'grid';
        }

        async function loadTools() {
            try {
                // 优化：尝试读取短期会话缓存。用户从子页面返回时可实现瞬间秒开，且不消耗宝贵的 GitHub API 次数
                const cachedData = sessionStorage.getItem('class_tools_cache');
                if (cachedData) {
                    statusMessage.style.display = 'none';
                    renderCards(JSON.parse(cachedData));
                    return;
                }

                // 1. 请求 GitHub API (注意去掉了末尾的斜杠，这样更稳定)
                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents`;
                const res = await fetch(apiUrl);
                
                // 精准捕获 API 限流错误
                if (!res.ok) {
                    if (res.status === 403) throw new Error('触发了GitHub API每小时60次的匿名请求限流限制');
                    if (res.status === 404) throw new Error('未找到仓库，请检查库名大小写');
                    throw new Error(`HTTP 异常 ${res.status}`);
                }
                
                const files = await res.json();
                
                // 2. 筛选出所有后缀为 .html 的文件
                const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

                // 3. 并发拉取并解析每个 HTML 文件
                const cardsData = await Promise.all(htmlFiles.map(async (file) => {
                    let title = file.name.replace('.html', '');
                    let desc = "点击进入使用该管理工具";
                    let icon = "🛠️";

                    // 如果属于已知工具，先赋默认值保证美观
                    if (fallbackTools[file.name]) {
                        title = fallbackTools[file.name].title;
                        desc = fallbackTools[file.name].desc;
                        icon = fallbackTools[file.name].icon;
                    }

                    // 尝试抓取文件源码获取最新的 meta 配置
                    try {
                        const htmlRes = await fetch(file.name);
                        if (htmlRes.ok) {
                            const htmlText = await htmlRes.text();
                            // 优化：采用正则而非 DOMParser 解析整个庞大文档，大幅降低手机端的 CPU 解析压力
                            const titleMatch = htmlText.match(/<title>(.*?)<\/title>/i);
                            if (titleMatch) title = titleMatch[1].trim();
                            const descMatch = htmlText.match(/<meta\s+name="description"\s+content="([^"]*)"/i);
                            if (descMatch) desc = descMatch[1];
                            const iconMatch = htmlText.match(/<meta\s+name="icon"\s+content="([^"]*)"/i);
                            if (iconMatch) icon = iconMatch[1];
                        }
                    } catch (e) { /* 忽略抓取失败，使用默认值 */ }

                    return { url: file.name, icon, title, desc };
                }));

                // 4. 按固定顺序排序后渲染
                cardsData.sort((a, b) => (sortOrder[a.url] || 999) - (sortOrder[b.url] || 999));
                statusMessage.style.display = 'none';
                renderCards(cardsData);

                // 优化：渲染成功后存入会话缓存，直到用户彻底关闭该页签前无需重试
                sessionStorage.setItem('class_tools_cache', JSON.stringify(cardsData));

            } catch (error) {
                console.warn("自动拉取失败，启用保底渲染模式:", error.message);
                
                // 启用保底渲染：转换预设好的四大核心工具并按固定顺序呈现
                const fallbackData = Object.keys(fallbackTools).map(url => {
                    return { url: url, ...fallbackTools[url] };
                });
                fallbackData.sort((a, b) => (sortOrder[a.url] || 999) - (sortOrder[b.url] || 999));
                renderCards(fallbackData);

                // 直接隐藏状态栏，静默降级
                statusMessage.style.display = 'none';
            }
        }

        // 启动执行
        loadTools();
    </script>

</body>
</html>
