<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理工具箱</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #4a90e2;
            color: white;
            width: 100%;
            padding: 2.5rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }
        .container {
            max-width: 900px;
            width: 90%;
            margin: 3rem auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: white;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
        }
        .icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        .card h2 {
            margin: 0 0 0.8rem 0;
            font-size: 1.3rem;
            color: #2c3e50;
        }
        .card p {
            margin: 0;
            color: #7f8c8d;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        /* 加载动画样式 */
        #loading {
            margin-top: 5rem;
            color: #7f8c8d;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid #bdc3c7;
            border-top-color: #4a90e2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>帅哥的班级管理工具箱</h1>
    </header>

    <div id="loading">
        <div class="spinner"></div>
        <span>正在扫描工具箱...</span>
    </div>

    <div class="container" id="toolsContainer" style="display: none;">
        </div>

    <script>
        // 1. 旧工具的兼容预设（确保你以前做的工具图标和描述不丢失）
        const knownTools = {
            "classseats.html": { icon: "🪑", title: "互动座位表", desc: "快速生成与调整学生座位安排，支持男女生分布与小组排列" },
            "classjournal.html": { icon: "📖", title: "班级日志", desc: "记录与查看班级日常事务与学生情况" },
            "exceltrans.html": { icon: "📊", title: "表格数据处理", desc: "快速处理、转换与导出Excel表格数据" }
        };

        const owner = 'Dzreal';
        const repo = 'Class';
        const container = document.getElementById('toolsContainer');
        const loading = document.getElementById('loading');

        async function loadTools() {
            try {
                // 2. 调用 GitHub API 获取仓库文件目录
                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/`;
                const res = await fetch(apiUrl);
                if (!res.ok) throw new Error('读取仓库列表失败');
                const files = await res.json();

                // 3. 筛选出所有后缀为 .html 的文件（并排除 index 本身）
                const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

                // 4. 并发拉取每个 HTML 文件的源码，提取标题和描述
                const cardsData = await Promise.all(htmlFiles.map(async (file) => {
                    // 默认基础信息
                    let title = file.name.replace('.html', '');
                    let desc = "点击进入使用该管理工具";
                    let icon = "🛠️"; // 未知工具的默认图标

                    // 优先使用预设（旧工具）
                    if (knownTools[file.name]) {
                        title = knownTools[file.name].title;
                        desc = knownTools[file.name].desc;
                        icon = knownTools[file.name].icon;
                    }

                    // 如果是新工具（不在预设里），尝试去解析它的源码读取 <title> 和 <meta>
                    try {
                        const htmlRes = await fetch(file.name);
                        if (htmlRes.ok) {
                            const htmlText = await htmlRes.text();
                            
                            // 利用 DOMParser 解析 HTML
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(htmlText, 'text/html');
                            
                            // 读取网页标题
                            if (doc.title) title = doc.title;
                            
                            // 尝试读取特殊 meta 标签提取描述和图标（留给未来的扩展接口）
                            const metaDesc = doc.querySelector('meta[name="description"]');
                            if (metaDesc && metaDesc.content) desc = metaDesc.content;
                            
                            const metaIcon = doc.querySelector('meta[name="icon"]');
                            if (metaIcon && metaIcon.content) icon = metaIcon.content;
                        }
                    } catch (e) {
                        console.warn(`无法读取 ${file.name} 的内部信息，使用默认描述。`);
                    }

                    return { url: file.name, icon, title, desc };
                }));

                // 5. 渲染卡片到页面
                cardsData.forEach(data => {
                    const card = document.createElement('a');
                    card.href = data.url;
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="icon">${data.icon}</div>
                        <h2>${data.title}</h2>
                        <p>${data.desc}</p>
                    `;
                    container.appendChild(card);
                });

                // 隐藏加载动画，显示工具网格
                loading.style.display = 'none';
                container.style.display = 'grid';

            } catch (error) {
                loading.innerHTML = `⚠️ 加载失败: ${error.message} <br> (可能遇到网络波动，请刷新重试)`;
                console.error(error);
            }
        }

        // 启动执行
        loadTools();
    </script>

</body>
</html>
