<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理工具箱</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #4a90e2;
            color: white;
            width: 100%;
            padding: 2.5rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }
        .container {
            max-width: 900px;
            width: 90%;
            margin: 3rem auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: white;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
        }
        .icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        .card h2 {
            margin: 0 0 0.8rem 0;
            font-size: 1.3rem;
            color: #2c3e50;
        }
        .card p {
            margin: 0;
            color: #7f8c8d;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        /* 加载与提示样式 */
        #statusMessage {
            margin-top: 3rem;
            color: #7f8c8d;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            flex-direction: column;
            gap: 10px;
            text-align: center;
        }
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid #bdc3c7;
            border-top-color: #4a90e2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>帅哥的班级管理工具箱</h1>
    </header>

    <div id="statusMessage">
        <div class="spinner" id="spinner"></div>
        <span id="statusText">正在自动扫描工具箱最新组件...</span>
    </div>

    <div class="container" id="toolsContainer" style="display: none;">
        </div>

    <script>
        // 核心配置
        const owner = 'Dzreal';
        const repo = 'Class'; 

        // 🛡️ 保底配置：把四大金刚写在这里。哪怕 GitHub API 彻底断连，页面也能渲染出这四个工具！
        const fallbackTools = {
            "classseats.html": { icon: "🪑", title: "互动座位表", desc: "快速生成与调整学生座位安排，支持男女生分布与小组排列" },
            "classjournal.html": { icon: "📖", title: "班级日志", desc: "记录与查看班级日常事务与学生情况" },
            "exceltrans.html": { icon: "📊", title: "表格数据处理", desc: "快速处理、转换与导出Excel表格数据" },
            "vote.html": { icon: "🗳️", title: "班级投票系统", desc: "支持单选多选、云端保存配置与记录的实时投票工具" }
        };

        const container = document.getElementById('toolsContainer');
        const statusMessage = document.getElementById('statusMessage');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');

        // 渲染卡片的函数
        function renderCards(cardsData) {
            container.innerHTML = '';
            cardsData.forEach(data => {
                const card = document.createElement('a');
                card.href = data.url;
                card.className = 'card';
                card.innerHTML = `
                    <div class="icon">${data.icon}</div>
                    <h2>${data.title}</h2>
                    <p>${data.desc}</p>
                `;
                container.appendChild(card);
            });
            container.style.display = 'grid';
        }

        async function loadTools() {
            try {
                // 1. 请求 GitHub API (注意去掉了末尾的斜杠，这样更稳定)
                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents`;
                const res = await fetch(apiUrl);
                
                // 精准捕获 API 限流错误
                if (!res.ok) {
                    if (res.status === 403) throw new Error('触发了GitHub API每小时60次的匿名请求限流限制');
                    if (res.status === 404) throw new Error('未找到仓库，请检查库名大小写');
                    throw new Error(`HTTP 异常 ${res.status}`);
                }
                
                const files = await res.json();
                
                // 2. 筛选出所有后缀为 .html 的文件
                const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

                // 3. 并发拉取并解析每个 HTML 文件
                const cardsData = await Promise.all(htmlFiles.map(async (file) => {
                    let title = file.name.replace('.html', '');
                    let desc = "点击进入使用该管理工具";
                    let icon = "🛠️";

                    // 如果属于已知工具，先赋默认值保证美观
                    if (fallbackTools[file.name]) {
                        title = fallbackTools[file.name].title;
                        desc = fallbackTools[file.name].desc;
                        icon = fallbackTools[file.name].icon;
                    }

                    // 尝试抓取文件源码获取最新的 meta 配置
                    try {
                        const htmlRes = await fetch(file.name);
                        if (htmlRes.ok) {
                            const htmlText = await htmlRes.text();
                            const doc = new DOMParser().parseFromString(htmlText, 'text/html');
                            if (doc.title) title = doc.title;
                            const metaDesc = doc.querySelector('meta[name="description"]');
                            if (metaDesc && metaDesc.content) desc = metaDesc.content;
                            const metaIcon = doc.querySelector('meta[name="icon"]');
                            if (metaIcon && metaIcon.content) icon = metaIcon.content;
                        }
                    } catch (e) { /* 忽略抓取失败，使用默认值 */ }

                    return { url: file.name, icon, title, desc };
                }));

                // 4. 成功后隐藏状态栏，渲染卡片
                statusMessage.style.display = 'none';
                renderCards(cardsData);

            } catch (error) {
                console.warn("自动拉取失败，启用保底渲染模式:", error.message);
                
                // 启用保底渲染：转换预设好的四大核心工具并呈现
                const fallbackData = Object.keys(fallbackTools).map(url => {
                    return { url: url, ...fallbackTools[url] };
                });
                renderCards(fallbackData);

                // 直接隐藏状态栏，静默降级
                statusMessage.style.display = 'none';
            }
        }

        // 启动执行
        loadTools();
    </script>

</body>
</html>
