<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>班级投票系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; width: 100vw; background-color: #f4f7f6; overflow: hidden; }
        
        /* 自定义滚动条更美观 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #455a64; border-radius: 4px; }
        
        /* --- 全局固定左上角的菜单按钮 --- */
        .menu-toggle {
            position: fixed; top: 15px; left: 20px; z-index: 1005; 
            background: transparent; color: #2c3e50; border: none; padding: 8px 12px; border-radius: 6px; 
            cursor: pointer; font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 8px; 
            transition: color 0.3s ease, background-color 0.3s ease;
        }
        .menu-toggle:hover { background-color: rgba(0, 0, 0, 0.05); }
        body.sidebar-open .menu-toggle { color: #ffffff; }
        body.sidebar-open .menu-toggle:hover { background-color: rgba(255, 255, 255, 0.1); }

        /* --- 核心动画区域：左侧配置区 --- */
        .left-panel { 
            width: 0; background-color: #2c3e50; color: white; overflow: hidden; flex-shrink: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000;
        }
        body.sidebar-open .left-panel { width: 420px; max-width: 85vw; }

        .left-panel-content {
            width: 420px; max-width: 85vw; height: calc(100vh - 70px); margin-top: 70px; 
            padding: 0px 20px 30px 20px; overflow-y: auto; opacity: 0; transition: opacity 0.2s ease;
        }
        body.sidebar-open .left-panel-content { opacity: 1; transition: opacity 0.3s ease 0.1s; }

        /* --- 右侧投票区 --- */
        .right-panel { 
            flex-grow: 1; height: 100vh; padding: 70px 40px 40px 40px; overflow-y: auto; 
            background-color: #ffffff; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }

        /* --- 控件样式 --- */
        .config-section { background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .config-section h3 { margin-top: 0; color: #1abc9c; font-size: 1.1em; border-bottom: 1px solid #455a64; padding-bottom: 10px; }
        input[type="text"], input[type="password"], textarea, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        textarea { resize: vertical; min-height: 80px; }
        button.action-btn { background-color: #1abc9c; color: white; border: none; padding: 12px; margin: 5px 0; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; transition: background 0.3s; }
        button.action-btn:hover { background-color: #16a085; }
        button.action-btn.secondary { background-color: #3498db; }
        button.action-btn.secondary:hover { background-color: #2980b9; }
        button.action-btn.danger { background-color: #e74c3c; }
        button.action-btn.danger:hover { background-color: #c0392b; }
        button.action-btn.small-btn { padding: 6px 10px; font-size: 13px; width: auto; margin: 0; }
        
        .hidden { display: none !important; }
        .question-list-item { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; padding: 10px; margin-top: 8px; border-radius: 4px; font-size: 14px; }

        .vote-header { text-align: center; margin-bottom: 30px; }
        .student-auth { display: flex; gap: 20px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef; }
        .student-auth select { flex: 1; margin: 0; font-size: 18px; padding: 15px; border-radius: 4px; border: 1px solid #ccc; background: white; cursor: pointer; }
        .question-card { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .question-card h4 { margin-top: 0; font-size: 1.2em; color: #333; }
        .option-label { display: block; margin: 10px 0; padding: 15px; background: #f1f3f5; border-radius: 6px; cursor: pointer; font-size: 18px; border: 2px solid transparent; transition: all 0.2s; }
        .option-label:hover { background: #e9ecef; }
        .option-label input { margin-right: 15px; transform: scale(1.5); }
        input[type="radio"]:checked + span, input[type="checkbox"]:checked + span { font-weight: bold; color: #1abc9c; }
        .submit-vote-btn { background-color: #27ae60; font-size: 20px; padding: 15px; margin-top: 20px; }
        .submit-vote-btn:hover { background-color: #2ecc71; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 80%; max-height: 80%; overflow-y: auto; color: #333; }
        .modal-close { float: right; cursor: pointer; font-size: 24px; font-weight: bold; }
        .result-bar { background: #3498db; height: 20px; border-radius: 10px; margin-top: 5px; transition: width 0.5s; }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">
        <span style="font-size: 22px; line-height: 1;">☰</span> <span>配置面板</span>
    </button>

    <div class="left-panel" id="leftPanel">
        <div class="left-panel-content">
            <div id="loginView">
                <h2 style="text-align: center; margin-top: 0;">管理员权限验证</h2>
                <input type="password" id="ghTokenLogin" placeholder="GitHub Token (新设备首次需填)" autocomplete="off" style="margin-bottom: 10px;">
                <input type="password" id="adminPwd" placeholder="请输入管理员密码" autocomplete="off">
                <button class="action-btn" id="loginBtn" onclick="verifyPassword()">解锁配置区</button>
                <p style="font-size: 12px; color: #95a5a6; text-align: center;">私有库云端实时验证，守护安全</p>
            </div>

            <div id="configView" class="hidden">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #455a64; margin-bottom: 15px; padding-bottom: 10px;">
                    <h2 style="margin: 0;">设置面板</h2>
                    <button class="action-btn danger small-btn" onclick="lockConfig()">退出锁定</button>
                </div>

                <div class="config-section">
                    <h3>1. 班级名单管理</h3>
                    <p style="font-size: 13px; color:#1abc9c; font-weight:bold; margin-bottom: 5px;">【从云端选取】</p>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <select id="cloudClassList" style="flex: 1;"><option value="">请选择班级...</option></select>
                        <button class="action-btn secondary small-btn" style="width: auto;" onclick="refreshCloudClasses()">🔄 获取</button>
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <button class="action-btn" onclick="loadCloudClass()">读取并应用该名单</button>
                        <button class="action-btn danger" onclick="deleteCloudClass()">删除该名单</button>
                    </div>

                    <p id="cloudLoadStatus" style="font-size: 13px; color: #1abc9c; margin-top: 5px; margin-bottom: 0; font-weight: bold;"></p>
                    
                    <hr style="border:0; border-top:1px dashed #455a64; margin:15px 0;">
                    
                    <p style="font-size: 13px; color:#bdc3c7; margin-bottom: 5px;">【首次使用: 从 Excel 导入并存入云端】</p>
                    <input type="file" id="excelUpload" accept=".xlsx, .xls" style="display: none;" onchange="importAndUploadExcel(event)">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="newClassName" placeholder="设定名单名称(如: 一班)" style="flex: 1;">
                        <button class="action-btn secondary" style="width: auto;" onclick="triggerExcelUpload()">导入</button>
                    </div>
                    
                    <p id="classDataStatus" style="font-size: 14px; font-weight: bold; margin-top: 10px; color: #f39c12;">当前未应用任何名单</p>
                </div>

                <div class="config-section">
                    <h3>2. 题目设置</h3>
                    <input type="text" id="qTitle" placeholder="请输入题目内容">
                    <select id="qType">
                        <option value="radio">单选题</option>
                        <option value="checkbox">多选题</option>
                    </select>
                    <textarea id="qOptions" placeholder="选项：用逗号或回车分隔"></textarea>
                    
                    <div style="display: flex; gap: 10px;">
                        <button class="action-btn secondary" id="addQuestionBtn" onclick="addQuestion()">添加题目</button>
                        <button class="action-btn hidden" id="cancelEditBtn" onclick="cancelEdit()" style="background-color: #7f8c8d;">取消编辑</button>
                    </div>
                    
                    <div id="questionListInfo" style="margin-top: 15px; font-size: 14px; font-weight: bold; color: #1abc9c;">当前共 0 题</div>
                    <div id="questionListContainer" style="margin-bottom: 15px;"></div>

                    <button class="action-btn danger" onclick="clearQuestions()">清空所有题目</button>
                </div>

                <div class="config-section">
                    <h3>3. 投票记录管理 (云端直连)</h3>
                    <p style="font-size: 13px; color:#bdc3c7; margin-bottom: 5px;">【保存当前工作区到云端】</p>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="recordName" placeholder="记录名称(如: 班干选举)" style="flex: 1;">
                        <button class="action-btn" style="width: auto;" onclick="saveVoteRecord()">云端保存</button>
                    </div>
                    
                    <hr style="border:0; border-top:1px dashed #455a64; margin:15px 0;">
                    
                    <p style="font-size: 13px; color:#1abc9c; font-weight:bold; margin-bottom: 5px;">【读取与管理历史记录】</p>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <select id="cloudRecordList" style="flex: 1;"><option value="">请选择云端记录...</option></select>
                        <button class="action-btn secondary small-btn" style="width: auto;" onclick="refreshCloudRecords()">🔄 获取</button>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <button class="action-btn secondary" onclick="loadCloudRecord()">下载恢复</button>
                        <button class="action-btn danger" onclick="deleteCloudRecord()">彻底删除</button>
                    </div>

                    <button class="action-btn" onclick="showVisualization()" style="margin-top: 15px;">📊 可视化当前结果</button>
                    <button class="action-btn danger" onclick="clearLocalVotes()" style="margin-top: 10px;">清空本地投票 (不影响云端)</button>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel" id="rightPanel">
        <div class="vote-header">
            <h1 style="color: #2c3e50; margin-top: 0;">班级投票系统</h1>
            <p style="color: #7f8c8d; font-size: 18px;">请验证您的身份后完成投票，完成后将设备传给下一位同学。</p>
        </div>

        <div class="student-auth">
            <select id="studentSelect">
                <option value="">请等待读取名单...</option>
            </select>
        </div>

        <div id="votingArea">
            <p style="text-align: center; color: #95a5a6; font-size: 18px; margin-top: 50px;">请等待老师配置题目...</p>
        </div>

        <button class="action-btn submit-vote-btn hidden" id="submitBtn" onclick="submitVote()">确认提交并传给下一位</button>
    </div>

    <div id="visualModal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" onclick="closeVisualization()">&times;</span>
            <h2>投票结果统计</h2>
            <div id="visualContent"></div>
        </div>
    </div>

    <script>
        // 核心数据
        let appData = { students: [], questions: [], votes: [] };
        let editingQuestionId = null; 

        // ------------------ GitHub API 交互封装 ------------------
        const GitHub = {
            get config() {
                return {
                    token: localStorage.getItem('ghToken') || '',
                    owner: 'Dzreal', 
                    repo: 'Class-Data' 
                };
            },
            get headers() {
                return {
                    'Authorization': `token ${this.config.token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                };
            },
            checkConfig(silent = false) {
                if (!this.config.token) {
                    if (!silent) alert('缺少 GitHub Token！请先填写 Token。');
                    return false;
                }
                return true;
            },
            encode(str) {
                return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1)));
            },
            decode(str) {
                return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            },
            async getSha(path) {
                const res = await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${path}`, { headers: this.headers });
                if (res.ok) { const data = await res.json(); return data.sha; }
                return null;
            },
            async saveFile(path, contentObj, message) {
                if (!this.checkConfig()) return false;
                try {
                    const contentStr = JSON.stringify(contentObj, null, 2);
                    const encoded = this.encode(contentStr);
                    const sha = await this.getSha(path);
                    const body = { message, content: encoded };
                    if (sha) body.sha = sha;

                    const res = await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${path}`, {
                        method: 'PUT', headers: this.headers, body: JSON.stringify(body)
                    });
                    if (!res.ok) throw new Error(await res.text());
                    return true;
                } catch (e) {
                    alert('保存至 GitHub 失败: ' + e.message);
                    return false;
                }
            },
            async getFile(path) {
                if (!this.checkConfig()) return null;
                try {
                    const res = await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${path}`, { headers: this.headers });
                    if (!res.ok) throw new Error('文件不存在或权限不足');
                    const data = await res.json();
                    return JSON.parse(this.decode(data.content));
                } catch (e) {
                    console.error('读取 GitHub 失败: ' + e.message);
                    return null;
                }
            },
            async listFiles(dir) {
                if (!this.checkConfig()) return [];
                try {
                    const res = await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${dir}`, { headers: this.headers });
                    if (!res.ok) { if (res.status === 404) return []; throw new Error('获取列表失败'); }
                    const data = await res.json();
                    return data.filter(item => item.type === 'file').map(item => item.name);
                } catch (e) {
                    alert('获取云端列表失败: ' + e.message);
                    return [];
                }
            },
            async deleteFile(path, message) {
                if (!this.checkConfig()) return false;
                try {
                    const sha = await this.getSha(path);
                    if (!sha) { alert('云端未找到该文件！'); return false; }
                    const res = await fetch(`https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${path}`, {
                        method: 'DELETE', headers: this.headers, body: JSON.stringify({ message, sha })
                    });
                    if (!res.ok) throw new Error('删除失败');
                    return true;
                } catch (e) {
                    alert('云端删除失败: ' + e.message);
                    return false;
                }
            }
        };

        // --- 渲染学生下拉框核心逻辑 ---
        function renderStudentDropdown() {
            const select = document.getElementById('studentSelect');
            if (!select) return;
            
            if (!appData.students || appData.students.length === 0) {
                select.innerHTML = '<option value="">请等待老师配置班级名单...</option>';
                return;
            }

            const votedIds = appData.votes.map(v => String(v.studentId));
            const unvotedStudents = appData.students.filter(s => !votedIds.includes(String(s.id)));

            select.innerHTML = `<option value="">还剩 ${unvotedStudents.length} 人未投票 (请下拉选择)</option>`;

            unvotedStudents.forEach(s => {
                select.innerHTML += `<option value="${s.id}|${s.name}">${s.id} - ${s.name}</option>`;
            });
        }

        window.onload = function() {
            initGhConfig();
            loadFromLocal();
            renderQuestionList();
            renderVotingInterface();
            updateClassStatus();
            renderStudentDropdown();
        };

        function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
        
        async function verifyPassword() {
            const tokenLogin = document.getElementById('ghTokenLogin').value.trim();
            if (tokenLogin) {
                localStorage.setItem('ghToken', tokenLogin);
            }

            if (!GitHub.config.token) {
                alert("首次使用或更换设备，请先在上方输入 GitHub Token！\n（有Token才能连接您的私有库验证密码）");
                return;
            }

            const inputPwd = document.getElementById('adminPwd').value;
            if (!inputPwd) { alert("请输入密码！"); return; }

            const btn = document.getElementById('loginBtn');
            btn.innerText = "云端验证中..."; btn.disabled = true;

            const pwdData = await GitHub.getFile('voteconfigpassword.json');
            
            btn.innerText = "解锁配置区"; btn.disabled = false;

            if (!pwdData) {
                alert("身份验证失败！\n请确认以下事项：\n1. Token是否有效\n2. 私有库 Class-Data 根目录下是否存在 voteconfigpassword.json 文件\n3. 文件内容格式是否正确。");
                return;
            }

            // 兼容 {"password":"xxx"} 或 {"pwd":"xxx"}
            const realPwd = pwdData.password || pwdData.pwd;

            if (inputPwd === realPwd) {
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('configView').classList.remove('hidden');
                document.getElementById('adminPwd').value = ''; 
            } else { 
                alert("密码错误！"); 
            }
        }

        function lockConfig() {
            document.getElementById('adminPwd').value = '';
            document.getElementById('configView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
            document.body.classList.remove('sidebar-open');
        }

        // --- GitHub 账号配置存取 ---
        function initGhConfig() {
            const token = localStorage.getItem('ghToken') || '';
            document.getElementById('ghTokenLogin').value = token;
        }

        // --- 名单管理 (Excel -> GitHub / GitHub -> Local) ---
        function triggerExcelUpload() {
            if (!document.getElementById('newClassName').value.trim()) { alert('请先输入拟保存的名单名称！'); return; }
            document.getElementById('excelUpload').click();
        }

        function importAndUploadExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const name = document.getElementById('newClassName').value.trim();
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                    
                    let newStudents = [];
                    for (let i = 0; i < json.length; i++) {
                        let row = json[i];
                        if (row.length >= 2 && row[0] != null && row[1] != null) {
                            const idStr = String(row[0]).trim();
                            const nameStr = String(row[1]).trim();
                            if (idStr === '学号' || idStr.toLowerCase() === 'id') continue;
                            newStudents.push({ id: idStr, name: nameStr });
                        }
                    }

                    if (newStudents.length > 0) {
                        const success = await GitHub.saveFile(`classeslists/${name}.json`, newStudents, `Add class list ${name}`);
                        if(success) {
                            alert(`✅ 成功读取 Excel 并已将其写入 GitHub: classeslists/${name}.json`);
                            appData.students = newStudents;
                            appData.votes = []; // 导入新名单时，自动清空旧投票缓存
                            saveToLocal(); updateClassStatus(); refreshCloudClasses();
                            renderStudentDropdown();
                            document.getElementById('newClassName').value = '';
                        }
                    } else { alert("未能读取到有效名单内容。"); }
                } catch (err) { alert("解析失败，格式异常。"); }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = ''; 
        }

        async function refreshCloudClasses() {
            const select = document.getElementById('cloudClassList');
            select.innerHTML = '<option value="">获取中...</option>';
            const files = await GitHub.listFiles('classeslists');
            select.innerHTML = '<option value="">请选择班级...</option>';
            files.forEach(f => {
                if(f.endsWith('.json')) {
                    const opt = document.createElement('option');
                    opt.value = f; opt.innerText = f.replace('.json', '');
                    select.appendChild(opt);
                }
            });
        }

        async function loadCloudClass() {
            const fileName = document.getElementById('cloudClassList').value;
            if(!fileName) { alert('请先在下拉框选择名单'); return; }
            
            if (appData.votes.length > 0) {
                if (!confirm("⚠️ 注意：载入新的班级名单将会清空当前正在进行的投票记录！\n如果你还需要当前的投票数据，请先点击【取消】并将其保存到云端。\n确定要清空并载入新名单吗？")) {
                    return;
                }
            }

            const data = await GitHub.getFile(`classeslists/${fileName}`);
            if(data) {
                appData.students = data;
                appData.votes = []; 
                saveToLocal(); updateClassStatus();
                renderStudentDropdown();
                document.getElementById('cloudLoadStatus').innerText = `已读取到“${fileName.replace('.json', '')}”共${data.length}人`;
                alert(`✅ 成功从云端读取名单: ${fileName.replace('.json', '')}`);
            }
        }

        async function deleteCloudClass() {
            const fileName = document.getElementById('cloudClassList').value;
            if(!fileName) { alert('请先在下拉框选择要删除的名单'); return; }
            if(confirm(`🚨 危险操作！确定要永久删除云端名单 [${fileName.replace('.json', '')}] 吗？`)) {
                const success = await GitHub.deleteFile(`classeslists/${fileName}`, `Delete class list ${fileName}`);
                if(success) { 
                    alert('已彻底删除！'); 
                    refreshCloudClasses(); 
                }
            }
        }

        function updateClassStatus() {
            const status = document.getElementById('classDataStatus');
            if (appData.students && appData.students.length > 0) {
                status.innerText = `✅ 当前本地已载入 ${appData.students.length} 名学生名单。`;
                status.style.color = "#1abc9c";
            } else {
                status.innerText = `⚠️ 当前未应用任何名单。`;
                status.style.color = "#f39c12";
            }
        }

        // --- 题目管理 ---
        function addQuestion() {
            const title = document.getElementById('qTitle').value.trim();
            const type = document.getElementById('qType').value;
            const opts = document.getElementById('qOptions').value.trim().split(/[,，\n]/).map(o => o.trim()).filter(o => o);
            if (!title || opts.length < 2) { alert("题目不能为空，且至少两项选项！"); return; }

            if (editingQuestionId) {
                const q = appData.questions.find(q => q.id === editingQuestionId);
                if (q) { q.title = title; q.type = type; q.options = opts; }
                cancelEdit(); 
            } else {
                appData.questions.push({ id: Date.now(), title, type, options: opts });
                document.getElementById('qTitle').value = ''; document.getElementById('qOptions').value = '';
            }
            saveToLocal(); renderQuestionList(); renderVotingInterface();
        }

        function editQuestion(qId) {
            const q = appData.questions.find(item => item.id === qId);
            if (!q) return;
            document.getElementById('qTitle').value = q.title;
            document.getElementById('qType').value = q.type;
            document.getElementById('qOptions').value = q.options.join('\n');
            editingQuestionId = qId;
            document.getElementById('addQuestionBtn').innerText = "保存修改";
            document.getElementById('addQuestionBtn').style.backgroundColor = "#e67e22"; 
            document.getElementById('cancelEditBtn').classList.remove('hidden');
        }

        function cancelEdit() {
            editingQuestionId = null;
            document.getElementById('qTitle').value = ''; document.getElementById('qType').value = 'radio'; document.getElementById('qOptions').value = '';
            document.getElementById('addQuestionBtn').innerText = "添加题目";
            document.getElementById('addQuestionBtn').style.backgroundColor = ""; 
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function deleteSingleQuestion(qId) {
            if (confirm("确定删除该题？统计时将被忽略。")) {
                appData.questions = appData.questions.filter(q => q.id !== qId);
                saveToLocal(); renderQuestionList(); renderVotingInterface();
                if (editingQuestionId === qId) cancelEdit();
            }
        }

        function clearQuestions() {
            if (confirm("清空所有题目？不会删除现有记录数据。")) {
                appData.questions = [];
                saveToLocal(); renderQuestionList(); renderVotingInterface(); cancelEdit();
            }
        }

        function renderQuestionList() {
            document.getElementById('questionListInfo').innerText = `当前共 ${appData.questions.length} 题`;
            const container = document.getElementById('questionListContainer');
            container.innerHTML = ''; 
            appData.questions.forEach((q, index) => {
                container.innerHTML += `
                <div class="question-list-item">
                    <div style="flex:1; padding-right:10px; word-break: break-all;">
                        <strong>${index + 1}.</strong> ${q.title} <span style="color:#95a5a6; font-size:12px;">(${q.type === 'radio' ? '单选' : '多选'})</span>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <button class="action-btn secondary small-btn" onclick="editQuestion(${q.id})" style="background-color: #f39c12;">编辑</button>
                        <button class="action-btn danger small-btn" onclick="deleteSingleQuestion(${q.id})">删除</button>
                    </div>
                </div>`;
            });
        }

        // --- 投票记录云端存取 ---
        async function saveVoteRecord() {
            const name = document.getElementById('recordName').value.trim();
            if (!name) { alert('请填写要保存的记录名称！'); return; }
            
            const success = await GitHub.saveFile(`voterecords/${name}.json`, appData, `Save vote record ${name}`);
            if(success) {
                alert('✅ 工作区数据已完整备份到 GitHub！');
                document.getElementById('recordName').value = '';
                refreshCloudRecords();
            }
        }

        async function refreshCloudRecords() {
            const select = document.getElementById('cloudRecordList');
            select.innerHTML = '<option value="">获取中...</option>';
            const files = await GitHub.listFiles('voterecords');
            select.innerHTML = '<option value="">请选择云端记录...</option>';
            files.forEach(f => {
                if(f.endsWith('.json')) {
                    const opt = document.createElement('option');
                    opt.value = f; opt.innerText = f.replace('.json', '');
                    select.appendChild(opt);
                }
            });
        }

        async function loadCloudRecord() {
            const fileName = document.getElementById('cloudRecordList').value;
            if(!fileName) { alert('请先选择要读取的记录'); return; }
            const data = await GitHub.getFile(`voterecords/${fileName}`);
            if(data && data.questions) { 
                appData = data;
                saveToLocal(); updateClassStatus(); renderQuestionList(); renderVotingInterface();
                renderStudentDropdown();
                alert(`✅ 成功从云端恢复投票记录: ${fileName.replace('.json', '')}`);
            }
        }

        async function deleteCloudRecord() {
            const fileName = document.getElementById('cloudRecordList').value;
            if(!fileName) { alert('请先选择要删除的记录'); return; }
            if(confirm(`🚨 危险！确定要永久删除云端记录 [${fileName.replace('.json', '')}] 吗？`)) {
                const success = await GitHub.deleteFile(`voterecords/${fileName}`, `Delete vote record ${fileName}`);
                if(success) { alert('已彻底删除！'); refreshCloudRecords(); }
            }
        }

        function clearLocalVotes() {
            if (confirm("确定要清空目前工作区的投票结果吗？（只要不覆盖保存，云端的备份不受影响）")) {
                appData.votes = [];
                saveToLocal(); 
                renderStudentDropdown(); 
                alert("本地投票已清空，可开启下一轮投票。");
            }
        }

        // --- 右侧投票端 ---
        function renderVotingInterface() {
            const area = document.getElementById('votingArea');
            const btn = document.getElementById('submitBtn');
            if (appData.questions.length === 0) {
                area.innerHTML = '<p style="text-align: center; color: #95a5a6; font-size: 18px; margin-top: 50px;">请等待老师配置题目...</p>';
                btn.classList.add('hidden'); return;
            }
            btn.classList.remove('hidden'); area.innerHTML = '';
            appData.questions.forEach((q, index) => {
                let html = `<div class="question-card" id="qcard_${q.id}">
                                <h4>${index + 1}. ${q.title} <span style="font-weight:normal; color:#7f8c8d; font-size:0.8em;">(${q.type === 'radio' ? '单选' : '多选'})</span></h4>`;
                q.options.forEach((opt, oIndex) => {
                    const inputId = `q_${q.id}_opt_${oIndex}`;
                    html += `<label class="option-label" for="${inputId}">
                                <input type="${q.type}" id="${inputId}" name="name_q_${q.id}" value="${opt}">
                                <span>${opt}</span>
                             </label>`;
                });
                area.innerHTML += html + `</div>`;
            });
        }

        function submitVote() {
            const studentSelect = document.getElementById('studentSelect');
            const selectedValue = studentSelect ? studentSelect.value : '';
            
            if (!appData.students || appData.students.length === 0) {
                alert("请老师先在配置面板读取班级名单！"); 
                return;
            }
            
            if (!selectedValue) { 
                alert("请选择您的学号和姓名！"); 
                return; 
            }

            const [idInput, nameInput] = selectedValue.split('|');

            if (appData.votes.some(v => String(v.studentId) === String(idInput))) {
                alert(`学号 ${idInput} 已经完成过投票！`); 
                resetVotingForm(); 
                return;
            }

            let currentAnswers = {};
            for (let i = 0; i < appData.questions.length; i++) {
                const q = appData.questions[i];
                const inputs = document.querySelectorAll(`input[name="name_q_${q.id}"]:checked`);
                if (inputs.length === 0) { alert("请完成所有题目后再提交！"); return; }
                currentAnswers[`q_${q.id}`] = Array.from(inputs).map(i => i.value);
            }

            appData.votes.push({ studentId: idInput, studentName: nameInput, answers: currentAnswers, timestamp: Date.now() });
            saveToLocal();
            alert("提交成功！请传递给下一位。");
            resetVotingForm();
        }

        function resetVotingForm() {
            document.querySelectorAll('#votingArea input').forEach(input => input.checked = false);
            document.getElementById('rightPanel').scrollTop = 0;
            renderStudentDropdown(); 
        }

        // --- 可视化 ---
        function showVisualization() {
            const content = document.getElementById('visualContent');
            if (appData.questions.length === 0) { alert("当前没有题目数据。"); return; }
            let html = `<p>当前本地参与人数：<strong>${appData.votes.length}</strong> 人</p>`;

            appData.questions.forEach((q, index) => {
                html += `<div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;"><h3 style="margin-bottom:10px;">${index + 1}. ${q.title}</h3>`;
                let counts = {}; q.options.forEach(opt => counts[opt] = 0);
                appData.votes.forEach(vote => {
                    (vote.answers[`q_${q.id}`] || []).forEach(ans => { if (counts[ans] !== undefined) counts[ans]++; });
                });
                q.options.forEach(opt => {
                    const percent = appData.votes.length === 0 ? 0 : Math.round((counts[opt] / appData.votes.length) * 100);
                    html += `<div style="margin-bottom: 8px;"><span>${opt} - <strong>${counts[opt]}票</strong> (${percent}%)</span><div class="result-bar" style="width: ${percent}%;"></div></div>`;
                });
                html += `</div>`;
            });
            content.innerHTML = html;
            document.getElementById('visualModal').classList.remove('hidden');
        }

        function closeVisualization() { document.getElementById('visualModal').classList.add('hidden'); }

        // --- 本地缓存机制（防刷新丢失）---
        function saveToLocal() { localStorage.setItem('classVoteData', JSON.stringify(appData)); }
        function loadFromLocal() {
            try {
                const saved = localStorage.getItem('classVoteData');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    appData.students = parsed.students || [];
                    appData.questions = parsed.questions || [];
                    appData.votes = parsed.votes || [];
                }
            } catch (e) { console.error("本地数据解析失败"); }
        }
    </script>
</body>
</html>
