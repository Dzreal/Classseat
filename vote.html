<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>班级投票系统</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; background-color: #f4f7f6; }
        
        /* 左右分栏布局 */
        .left-panel { width: 40%; background-color: #2c3e50; color: white; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; border-right: 2px solid #1a252f; }
        .right-panel { width: 60%; padding: 40px; overflow-y: auto; background-color: #ffffff; }

        /* 左侧配置区样式 */
        .config-section { background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .config-section h3 { margin-top: 0; color: #1abc9c; font-size: 1.1em; border-bottom: 1px solid #455a64; padding-bottom: 10px; }
        input[type="text"], input[type="password"], textarea, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; }
        textarea { resize: vertical; min-height: 80px; }
        button { background-color: #1abc9c; color: white; border: none; padding: 12px 20px; margin: 5px 0; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #16a085; }
        button.secondary { background-color: #3498db; }
        button.secondary:hover { background-color: #2980b9; }
        button.danger { background-color: #e74c3c; }
        button.danger:hover { background-color: #c0392b; }
        
        /* 隐藏类 */
        .hidden { display: none !important; }

        /* 右侧投票区样式 */
        .vote-header { text-align: center; margin-bottom: 30px; }
        .student-auth { display: flex; gap: 20px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef; }
        .student-auth input { flex: 1; margin: 0; font-size: 18px; padding: 15px; }
        .question-card { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .question-card h4 { margin-top: 0; font-size: 1.2em; color: #333; }
        .option-label { display: block; margin: 10px 0; padding: 15px; background: #f1f3f5; border-radius: 6px; cursor: pointer; font-size: 18px; border: 2px solid transparent; transition: all 0.2s; }
        .option-label:hover { background: #e9ecef; }
        .option-label input { margin-right: 15px; transform: scale(1.5); }
        input[type="radio"]:checked + span, input[type="checkbox"]:checked + span { font-weight: bold; color: #1abc9c; }
        .submit-vote-btn { background-color: #27ae60; font-size: 20px; padding: 15px; margin-top: 20px; }
        .submit-vote-btn:hover { background-color: #2ecc71; }

        /* 弹窗样式 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 80%; max-height: 80%; overflow-y: auto; color: #333; }
        .modal-close { float: right; cursor: pointer; font-size: 24px; font-weight: bold; }
        .result-bar { background: #3498db; height: 20px; border-radius: 10px; margin-top: 5px; transition: width 0.5s; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div id="loginView">
            <h2 style="text-align: center;">管理员配置</h2>
            <input type="password" id="adminPwd" placeholder="请输入管理员密码" autocomplete="off">
            <button onclick="verifyPassword()">解锁配置区</button>
            <p style="font-size: 12px; color: #95a5a6; text-align: center;">默认演示密码：123</p>
        </div>

        <div id="configView" class="hidden">
            <h2 style="text-align: center; margin-top: 0;">设置面板</h2>
            
            <div class="config-section">
                <h3>1. 班级名单录入 (JSON格式)</h3>
                <textarea id="classDataInput" placeholder='例如：[{"id":"01","name":"张三"},{"id":"02","name":"李四"}]'></textarea>
                <button onclick="saveClassData()">确认录入班级名单</button>
                <p id="classDataStatus" style="font-size: 12px; margin: 5px 0;"></p>
            </div>

            <div class="config-section">
                <h3>2. 题目设置</h3>
                <input type="text" id="qTitle" placeholder="请输入题目内容">
                <select id="qType">
                    <option value="radio">单选题</option>
                    <option value="checkbox">多选题</option>
                </select>
                <textarea id="qOptions" placeholder="请输入选项，用英文逗号或回车分隔。例如：A. 选项一, B. 选项二"></textarea>
                <button onclick="addQuestion()" class="secondary">添加该题目</button>
                <div id="questionList" style="margin-top: 10px; font-size: 14px; background: #2c3e50; padding: 10px; border-radius: 4px;">当前共 0 题</div>
                <button onclick="clearQuestions()" class="danger" style="margin-top: 10px;">清空所有题目</button>
            </div>

            <div class="config-section">
                <h3>3. 数据管理</h3>
                <input type="file" id="uploadData" accept=".json" style="display: none;" onchange="importData(event)">
                <button onclick="document.getElementById('uploadData').click()" class="secondary">上传已有投票数据 (.json)</button>
                <button onclick="exportData()" class="secondary">下载当前投票数据 (.json)</button>
                <button onclick="showVisualization()" style="margin-top: 15px;">可视化投票结果</button>
                <button onclick="clearVotes()" class="danger" style="margin-top: 10px;">清空历史投票记录</button>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="vote-header">
            <h1 style="color: #2c3e50;">班级投票系统</h1>
            <p style="color: #7f8c8d; font-size: 18px;">请验证您的身份后完成投票，完成后将设备传给下一位同学。</p>
        </div>

        <div class="student-auth">
            <input type="text" id="studentId" placeholder="请输入您的学号 (如: 01)" autocomplete="off">
            <input type="text" id="studentName" placeholder="请输入您的姓名 (如: 张三)" autocomplete="off">
        </div>

        <div id="votingArea">
            <p style="text-align: center; color: #95a5a6; font-size: 18px; margin-top: 50px;">请等待老师配置题目...</p>
        </div>

        <button id="submitBtn" class="submit-vote-btn hidden" onclick="submitVote()">确认提交并传给下一位</button>
    </div>

    <div id="visualModal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" onclick="closeVisualization()">&times;</span>
            <h2>投票结果统计</h2>
            <div id="visualContent"></div>
        </div>
    </div>

    <script>
        // 核心数据结构
        let appData = {
            students: [],   // {id: "01", name: "张三"}
            questions: [],  // {id: 1, title: "...", type: "radio", options: ["A", "B"]}
            votes: []       // {studentId: "01", answers: { "q_1": ["A"] }}
        };

        const ADMIN_PWD = "123"; // 可自行修改默认密码

        // 页面加载时初始化数据
        window.onload = function() {
            loadFromLocal();
            renderQuestionList();
            renderVotingInterface();
            updateClassStatus();
        };

        // --- 左侧：系统配置与权限 ---

        function verifyPassword() {
            const pwd = document.getElementById('adminPwd').value;
            if (pwd === ADMIN_PWD) {
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('configView').classList.remove('hidden');
            } else {
                alert("密码错误！");
            }
        }

        // 保存名单
        function saveClassData() {
            const input = document.getElementById('classDataInput').value;
            try {
                const parsed = JSON.parse(input);
                if (Array.isArray(parsed)) {
                    appData.students = parsed;
                    saveToLocal();
                    updateClassStatus();
                    alert("名单导入成功！");
                } else {
                    alert("格式错误：必须是JSON数组格式。");
                }
            } catch (e) {
                alert("JSON 解析失败，请检查格式是否正确！\n参考格式: [{\"id\":\"01\",\"name\":\"张三\"}]");
            }
        }

        function updateClassStatus() {
            const status = document.getElementById('classDataStatus');
            status.innerText = `当前系统已录入 ${appData.students.length} 名学生。`;
            status.style.color = "#1abc9c";
        }

        // 添加题目
        function addQuestion() {
            const title = document.getElementById('qTitle').value.trim();
            const type = document.getElementById('qType').value;
            const optionsStr = document.getElementById('qOptions').value.trim();

            if (!title || !optionsStr) {
                alert("题目和选项不能为空！");
                return;
            }

            // 支持逗号或换行分割选项
            const options = optionsStr.split(/[,，\n]/).map(o => o.trim()).filter(o => o);
            
            if (options.length < 2) {
                alert("至少需要提供两个选项！");
                return;
            }

            appData.questions.push({
                id: Date.now(), // 用时间戳做唯一标识
                title: title,
                type: type,
                options: options
            });

            saveToLocal();
            renderQuestionList();
            renderVotingInterface();
            
            // 清空输入框
            document.getElementById('qTitle').value = '';
            document.getElementById('qOptions').value = '';
        }

        function clearQuestions() {
            if (confirm("确定要清空所有题目吗？这不会删除已有的投票数据，但学生将无法继续投票。")) {
                appData.questions = [];
                saveToLocal();
                renderQuestionList();
                renderVotingInterface();
            }
        }

        function renderQuestionList() {
            const listObj = document.getElementById('questionList');
            listObj.innerHTML = `当前共 ${appData.questions.length} 题<br>`;
            appData.questions.forEach((q, index) => {
                listObj.innerHTML += `<div style="margin-top:5px;">${index + 1}. ${q.title} (${q.type === 'radio' ? '单选' : '多选'})</div>`;
            });
        }

        // 数据管理：下载与上传
        function exportData() {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `投票数据备份_${new Date().getTime()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (importedData.students && importedData.questions && importedData.votes) {
                        appData = importedData;
                        saveToLocal();
                        updateClassStatus();
                        renderQuestionList();
                        renderVotingInterface();
                        alert("数据读取成功！");
                    } else {
                        alert("数据格式不完整！");
                    }
                } catch (err) {
                    alert("文件解析失败，请确保是正确的JSON文件。");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // 允许重复上传同名文件
        }

        function clearVotes() {
            if (confirm("危险操作！确定要清空所有学生的投票记录吗？")) {
                appData.votes = [];
                saveToLocal();
                alert("历史投票记录已清空。");
            }
        }

        // --- 右侧：学生投票交互 ---

        function renderVotingInterface() {
            const area = document.getElementById('votingArea');
            const btn = document.getElementById('submitBtn');
            
            if (appData.questions.length === 0) {
                area.innerHTML = '<p style="text-align: center; color: #95a5a6; font-size: 18px; margin-top: 50px;">请等待老师配置题目...</p>';
                btn.classList.add('hidden');
                return;
            }

            btn.classList.remove('hidden');
            area.innerHTML = '';

            appData.questions.forEach((q, index) => {
                let html = `<div class="question-card" id="qcard_${q.id}">
                                <h4>${index + 1}. ${q.title} <span style="font-weight:normal; color:#7f8c8d; font-size:0.8em;">(${q.type === 'radio' ? '单选' : '多选'})</span></h4>`;
                
                q.options.forEach((opt, oIndex) => {
                    const inputId = `q_${q.id}_opt_${oIndex}`;
                    const nameAttr = `name_q_${q.id}`;
                    html += `<label class="option-label" for="${inputId}">
                                <input type="${q.type}" id="${inputId}" name="${nameAttr}" value="${opt}">
                                <span>${opt}</span>
                             </label>`;
                });
                html += `</div>`;
                area.innerHTML += html;
            });
        }

        function submitVote() {
            const idInput = document.getElementById('studentId').value.trim();
            const nameInput = document.getElementById('studentName').value.trim();

            if (!idInput || !nameInput) {
                alert("请输入学号和姓名！");
                return;
            }

            // 1. 验证身份是否在名单中
            if (appData.students.length > 0) {
                const isValid = appData.students.some(s => s.id === idInput && s.name === nameInput);
                if (!isValid) {
                    alert("身份验证失败，请检查学号或姓名是否输入正确！");
                    return;
                }
            } else {
                // 如果老师没有录入名单，则仅作简单非空判断即可
                if(!confirm("系统当前未录入全班名单，将直接记录您的学号和姓名，是否继续？")) return;
            }

            // 2. 检查是否已经投过票
            const hasVoted = appData.votes.some(v => v.studentId === idInput);
            if (hasVoted) {
                alert(`学号 ${idInput} 已经完成过投票，无法重复提交！`);
                // 清空输入框，防止霸屏
                resetVotingForm();
                return;
            }

            // 3. 收集答案
            let currentAnswers = {};
            let isAllAnswered = true;

            for (let i = 0; i < appData.questions.length; i++) {
                const q = appData.questions[i];
                const inputs = document.querySelectorAll(`input[name="name_q_${q.id}"]:checked`);
                
                if (inputs.length === 0) {
                    isAllAnswered = false;
                    break;
                }

                currentAnswers[`q_${q.id}`] = Array.from(inputs).map(input => input.value);
            }

            if (!isAllAnswered) {
                alert("请完成所有题目后再提交！");
                return;
            }

            // 4. 保存投票记录
            appData.votes.push({
                studentId: idInput,
                studentName: nameInput,
                answers: currentAnswers,
                timestamp: new Date().getTime()
            });

            saveToLocal();
            
            // 5. 成功提示并重置给下一个人
            alert("提交成功！请将设备传递给下一位同学。");
            resetVotingForm();
        }

        function resetVotingForm() {
            document.getElementById('studentId').value = '';
            document.getElementById('studentName').value = '';
            // 清除所有选中状态
            const allInputs = document.querySelectorAll('#votingArea input[type="radio"], #votingArea input[type="checkbox"]');
            allInputs.forEach(input => input.checked = false);
            // 滚动回顶部
            document.querySelector('.right-panel').scrollTop = 0;
        }

        // --- 数据可视化 ---

        function showVisualization() {
            const modal = document.getElementById('visualModal');
            const content = document.getElementById('visualContent');
            
            if (appData.questions.length === 0) {
                alert("当前没有题目数据。");
                return;
            }

            let html = `<p>总参与投票人数：<strong>${appData.votes.length}</strong> 人</p>`;

            appData.questions.forEach((q, index) => {
                html += `<div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
                            <h3 style="margin-bottom:10px;">${index + 1}. ${q.title}</h3>`;
                
                // 统计每个选项的得票数
                let optionCounts = {};
                q.options.forEach(opt => optionCounts[opt] = 0);

                appData.votes.forEach(vote => {
                    const answers = vote.answers[`q_${q.id}`];
                    if (answers) {
                        answers.forEach(ans => {
                            if (optionCounts[ans] !== undefined) optionCounts[ans]++;
                        });
                    }
                });

                // 渲染条形图
                q.options.forEach(opt => {
                    const count = optionCounts[opt];
                    const percent = appData.votes.length === 0 ? 0 : Math.round((count / appData.votes.length) * 100);
                    html += `<div style="margin-bottom: 8px;">
                                <span>${opt} - <strong>${count}票</strong> (${percent}%)</span>
                                <div class="result-bar" style="width: ${percent}%;"></div>
                             </div>`;
                });
                html += `</div>`;
            });

            content.innerHTML = html;
            modal.classList.remove('hidden');
        }

        function closeVisualization() {
            document.getElementById('visualModal').classList.add('hidden');
        }

        // --- 本地存储工具函数 ---

        function saveToLocal() {
            localStorage.setItem('classVoteData', JSON.stringify(appData));
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('classVoteData');
            if (saved) {
                try {
                    appData = JSON.parse(saved);
                    // 兼容旧数据结构补丁
                    if(!appData.students) appData.students = [];
                    if(!appData.questions) appData.questions = [];
                    if(!appData.votes) appData.votes = [];
                } catch (e) {
                    console.error("本地数据解析失败");
                }
            }
        }
    </script>
</body>
</html>
